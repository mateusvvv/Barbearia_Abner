<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <title>Painel Admin</title>

  <!-- CSS -->
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <main class="container">

    <!-- 🔐 LOGIN -->
    <section id="login" class="card">
      <h2>🔐 Login Admin</h2>

      <div class="form-group">
        <input type="email" id="email" placeholder="Email">
      </div>

      <div class="form-group">
        <input type="password" id="senha" placeholder="Senha">
      </div>

      <button class="btn" onclick="login()">Entrar</button>

      <p id="msgLogin" class="msg"></p>
    </section>

    <!-- 💈 PAINEL -->
    <section id="painel" class="hidden">

      <!-- TOPO -->
      <div class="header">
        <h1>Painel da barbearia</h1>
        <button class="btn logout" onclick="logout()">Sair</button>
      </div>

      <!-- ➕ AGENDAR CLIENTE -->
      <div class="card">
        <h3>📋 Agendar cliente</h3>

        <div class="form-group">
          <input type="text" id="nome" placeholder="Nome do cliente">
        </div>

        <div class="form-group">
          <input type="tel" id="telefone" placeholder="Telefone">
        </div>

        <div class="form-group">
          <select id="servico">
            <option value="">Escolha o serviço</option>
            <option>Corte</option>
            <option>Barba</option>
            <option>Corte + Barba</option>
            <option>Sobrancelha</option>
          </select>
        </div>

        <div class="form-group">
          <input type="date" id="data">
        </div>

        <div class="form-group">
          <input type="time" id="hora">
        </div>

        <button class="btn" onclick="adicionarHorario()">Agendar</button>

        <p id="msgAdmin" class="msg"></p>
      </div>

      <!-- 📅 LISTA -->
      <div class="lista-box">
        <h3>📅 Agendamentos</h3>
        <ul id="lista"></ul>
      </div>

    </section>

  </main>

  <script type="module" src="admin.js"></script>

</body>
</html>
