<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <title>Painel Admin</title>

  <link rel="stylesheet" href="admin.css">
</head>
<body>

<main class="container">

  <!-- 🔐 LOGIN -->
  <section id="login" class="card">
    <h2>🔐 Login Admin</h2>

    <div class="form-group">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="form-group">
      <input type="password" id="senha" placeholder="Senha">
    </div>

    <button class="btn" onclick="login()">Entrar</button>

    <p id="msgLogin" class="msg"></p>
  </section>

  <!-- 💈 PAINEL -->
  <section id="painel" class="hidden">

    <!-- TOPO -->
    <div class="header admin-topo">
      <div>
        <span class="eyebrow">Realtime Database</span>
        <h1>Painel da Barbearia</h1>
      </div>
      <button class="btn logout" onclick="logout()">Sair</button>
    </div>

    <div class="resumo-grid">
      <div class="resumo-card">
        <span>Total</span>
        <strong id="totalHorarios">0</strong>
      </div>
      <div class="resumo-card livre-card">
        <span>Vagas</span>
        <strong id="totalLivres">0</strong>
      </div>
      <div class="resumo-card ocupado-card">
        <span>Marcados</span>
        <strong id="totalOcupados">0</strong>
      </div>
    </div>

    <div class="admin-layout">
      <!-- ADICIONAR -->
      <div class="card form-card">
        <h3>Novo horário</h3>
        <p class="card-text">Cadastre uma vaga livre ou um cliente já marcado.</p>

        <div class="form-grid">
          <div class="form-group">
            <label>Data</label>
            <div class="date-time-field">
              <input type="date" id="data">
              <span>Toque para escolher a data</span>
            </div>
          </div>

          <div class="form-group">
            <label>Hora</label>
            <div class="date-time-field">
              <input type="time" id="hora">
              <span>Toque para escolher a hora</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select id="statusHorario">
            <option value="ocupado">Cliente marcado</option>
            <option value="livre">Vaga livre</option>
          </select>
        </div>

        <div id="dadosCliente">
          <div class="form-group">
            <label>Nome do cliente</label>
            <input type="text" id="nome" placeholder="Nome do cliente">
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="Telefone do cliente">
          </div>

          <div class="form-group">
            <label>Serviço</label>
            <select id="servico">
              <option value="">Escolha o serviço</option>
              <option>Corte</option>
              <option>Barba</option>
              <option>Corte + Barba</option>
              <option>Sobrancelha</option>
            </select>
          </div>
        </div>

        <button class="btn" onclick="adicionarHorario()">Salvar horário</button>

        <p id="msgAdmin" class="msg"></p>
      </div>

      <!-- LISTA -->
      <div class="lista-box card">
        <div class="lista-header">
          <div>
            <h3>Horários cadastrados</h3>
            <p class="card-text">Filtre por data, nome ou serviço.</p>
          </div>
          <input type="search" id="filtroHorarios" placeholder="Buscar">
        </div>
        <ul id="lista"></ul>
      </div>
    </div>

  </section>

</main>

<script type="module" src="admin.js"></script>

</body>
</html>
